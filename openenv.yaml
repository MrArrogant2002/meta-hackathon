name: customer-support-escalation-desk
version: "1.0.0"
description: >
  An OpenEnv environment for real-world customer support decision making. Agents
  review customer cases, policy snippets, account metadata, and prior messages
  to decide whether to refund, request more information, troubleshoot, escalate,
  or close a case. Tasks cover straightforward refunds, incomplete technical
  reports, and policy edge cases involving fraud risk.
author: ""
tags:
  - openenv
  - customer-support
  - escalation
  - policy
  - support-ops
  - real-world

tasks:
  - id: easy_refund_eligible
    name: "Resolve Obvious Refund Eligibility"
    difficulty: easy
    description: >
      A customer reports a damaged delivery with photo evidence already attached
      and the order is within the refund window. Choose the correct support
      resolution.
    max_steps: 4
    reward_threshold: 0.85

  - id: medium_missing_info_tech_issue
    name: "Request Missing Details Before Troubleshooting"
    difficulty: medium
    description: >
      A customer reports a technical issue, but the case is missing the order
      identifier and product model. Request the right information first, then
      choose the correct next action.
    max_steps: 6
    reward_threshold: 0.80

  - id: hard_policy_edge_case
    name: "Handle a Fraud-Flagged Policy Exception"
    difficulty: hard
    description: >
      An angry VIP customer is demanding an exception refund, but the account
      has an active chargeback flag and an in-flight replacement. Choose the
      correct policy-safe escalation path.
    max_steps: 6
    reward_threshold: 0.75

action_space:
  type: object
  required:
    - decision
    - priority
  properties:
    decision:
      type: string
      enum:
        - refund
        - troubleshoot
        - escalate
        - close
        - request_info
    priority:
      type: string
      enum:
        - low
        - medium
        - high
        - urgent
    reason_codes:
      type: array
      items:
        type: string
        enum:
          - damaged_item
          - technical_issue
          - missing_information
          - within_return_window
          - policy_exception
          - fraud_risk
          - repeat_contact
    request_fields:
      type: array
      items:
        type: string
        enum:
          - order_id
          - device_model
          - photo_evidence
          - delivery_date
          - serial_number
    recommended_steps:
      type: array
      items:
        type: string
        enum:
          - confirm_power_source
          - factory_reset
          - check_tracking
          - verify_account_email
    escalation_team:
      type: string
      enum:
        - none
        - billing_review
        - logistics_ops
        - technical_support
        - fraud_review
        - retention_desk
    customer_message:
      type: string

observation_space:
  type: object
  properties:
    task_id:
      type: string
    case_id:
      type: string
    task_description:
      type: string
    conversation_history:
      type: array
    customer_tier:
      type: string
    sentiment:
      type: string
    urgency:
      type: string
    order_snapshot:
      type: object
    policy_snippet:
      type: string
    known_facts:
      type: array
    missing_fields:
      type: array
    phase:
      type: string
    feedback:
      type: string
      nullable: true
    hint:
      type: string
      nullable: true
    step_number:
      type: integer
    max_steps:
      type: integer
    done:
      type: boolean
    last_action_error:
      type: string
      nullable: true

endpoints:
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"
  tasks: "GET /tasks"
  grader: "POST /grader"
  baseline: "POST /baseline"

